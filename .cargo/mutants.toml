# cargo-mutants configuration.
# https://mutants.rs/options.html#config-files
#
# Single source of truth for both local and CI runs. Tune carefully —
# this file gates whether `cargo mutants` finds new gaps in our test
# suite (the goal) or wastes hours chasing false positives.

# Exclude generated, infrastructural, or test-only files. cargo-mutants
# already skips `#[cfg(test)]` blocks and `mod tests` modules, but does
# NOT skip files under `tests/` directories used for integration tests,
# nor anything under `benches/` or `examples/`. We add those plus a few
# project-specific exclusions.
exclude_globs = [
    # Integration tests, benches, examples — these *are* the tests we
    # measure against, not subjects under test.
    "**/tests/**",
    "**/benches/**",
    "**/examples/**",

    # Shared test-only utilities. Mutating these would cause spurious
    # test failures unrelated to production code coverage.
    "**/test_utils.rs",
    "**/test_utils/**",

    # Generated / build-script output.
    "**/build.rs",

    # Workspace-tool, not a library.
    "automerge_subduction_ingest/**",

    # Wasm shim crates: their surface is overwhelmingly thin `#[wasm_bindgen]`
    # delegations to inner crates, and they can't be exercised by host
    # tests. Coverage comes from the underlying crates and from Playwright.
    "subduction_wasm/**",
    "sedimentree_wasm/**",
    "automerge_sedimentree_wasm/**",
    "automerge_subduction_wasm/**",

    # CLI entry points and runtime glue — too much wiring, too little
    # logic. We get value from in-tree integration tests instead.
    "subduction_cli/src/main.rs",
    "subduction_cli/src/server.rs",
]

# Skip specific mutation patterns that are almost always either trivially
# detectable or pointless to mutate:
#   - `Debug` / `Display` impls (often whitespace-sensitive but never
#     part of program correctness)
#   - `Drop` impls (rarely meaningfully tested at unit level)
#   - `arbitrary::Arbitrary` impls — only used by test data generators;
#     mutations to their internal arithmetic (e.g., `Vec::with_capacity`
#     args) are semantically unobservable because the surrounding code
#     still grows the buffer correctly via `extend_from_slice`. These
#     mutants survive every possible test, by construction.
#   - `unimplemented!()` / `todo!()` / `unreachable!()` macro calls
exclude_re = [
    "impl .*Debug for ",
    "impl .*Display for ",
    "impl .*Drop for ",
    "impl .*arbitrary::Arbitrary.* for ",

    # subduction_crypto/src/signed.rs:255 is inside a defensive
    # `bytes.get(fields_start..).ok_or(...)` whose `None` branch is
    # unreachable from `try_decode`: the outer `T::MIN_SIGNED_SIZE`
    # check (line 191) and the issuer bounds check (line 237) together
    # guarantee `bytes.len() >= fields_start` by the time we reach it.
    # The arithmetic in the `need:` field is defense-in-depth that no
    # input can exercise, so the `+ -> -` / `+ -> *` mutants there
    # cannot be killed by any test.
    "subduction_crypto/src/signed.rs:255:.*Signed<T>::try_decode",
]

# Be a little patient with builds. The workspace is large, and the
# default 5× of baseline can flap on shared CI runners. 2.0 means a
# mutant has 2× as long as the unmutated test run to be killed before
# we declare it timeout-survivor.
timeout_multiplier = 2.0

# Minimum cap on a single mutant test run, in seconds, regardless of
# baseline time. Some property-based tests (`bolero`) bias the
# distribution heavily; this prevents a fast baseline from making us
# kill legitimate mutant tests early.
minimum_test_timeout = 60

# Note: feature selection is intentionally NOT set here. The nightly
# matrix passes `--features` per-crate in `.github/workflows/mutants.yml`
# because most workspace crates don't declare `arbitrary` or `metrics`
# features, and passing a feature flag the package doesn't recognise
# fails the baseline build (silently → "0 mutants tested, 0 missed" →
# the workflow's `failure()` guard fires anyway because cargo-mutants
# returns non-zero on baseline failure → a spurious "surviving mutants"
# issue gets opened).
#
# Local invocations should mirror the per-crate features used in CI,
# e.g.:
#
#   cargo mutants -p subduction_core --features arbitrary,metrics
#   cargo mutants -p subduction_crypto --features arbitrary
#   cargo mutants -p sedimentree_core --features arbitrary
#   cargo mutants -p subduction_iroh             # no extra features
