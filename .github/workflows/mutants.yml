name: Mutation Tests

on:
  pull_request:
  schedule:
    # 03:17 UTC every day — offset from the top of the hour to avoid
    # contending with the broad fleet of cron jobs at :00.
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'diff'
        type: choice
        options:
          - diff
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  # Mutants spawn lots of compilations; trim disk IO where we can.
  RUSTFLAGS: -D warnings

jobs:
  # ─── PR runs: diff-only, required check, fails on any surviving mutant. ───
  mutants-diff:
    name: Mutants (diff)
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'diff')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          # cargo-mutants --in-diff needs the merge-base, so fetch full.
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Reads rust-toolchain.toml automatically; pinned to 1.90.0.
          cache: false

      - name: Cache Cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-mutants-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mutants-cargo-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            target
            mutants.out
          key: ${{ runner.os }}-mutants-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mutants-target-

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Establish baseline build
        run: cargo build --workspace --tests --features arbitrary

      - name: Compute diff vs base
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git merge-base origin/main HEAD)"
          fi
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          git diff "$BASE_SHA...HEAD" --no-color --binary > /tmp/mutants.diff
          echo "size=$(wc -c < /tmp/mutants.diff)" >> "$GITHUB_OUTPUT"

      - name: Run cargo-mutants on diff
        if: steps.diff.outputs.size != '0'
        run: |
          cargo mutants \
            --in-diff /tmp/mutants.diff \
            --no-shuffle \
            --jobs 4 \
            --colors=always \
            --output mutants.out

      - name: Skip when diff is empty
        if: steps.diff.outputs.size == '0'
        run: echo "No changes to mutate."

      - name: Upload mutants.out
        if: always() && steps.diff.outputs.size != '0'
        uses: actions/upload-artifact@v4
        with:
          name: mutants-out-diff
          path: mutants.out
          # Surviving mutant reports are tiny; keep them long enough to
          # cross-reference against PR review.
          retention-days: 30

  # ─── Nightly full run: every crate, matrix-split. Posts an issue on regression. ───
  mutants-full:
    name: Mutants (full / nightly)
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4 h cap per crate
    strategy:
      fail-fast: false
      matrix:
        crate:
          - sedimentree_core
          - sedimentree_fs_storage
          - subduction_core
          - subduction_crypto
          - subduction_ephemeral
          - subduction_http_longpoll
          - subduction_iroh
          - subduction_keyhive
          - subduction_websocket
          - automerge_sedimentree

    permissions:
      contents: read
      issues: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - name: Cache Cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-mutants-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mutants-cargo-

      - name: Cache build artifacts (per-crate)
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-mutants-${{ matrix.crate }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mutants-${{ matrix.crate }}-target-

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Run cargo-mutants on ${{ matrix.crate }}
        id: mutants
        run: |
          cargo mutants \
            --package ${{ matrix.crate }} \
            --no-shuffle \
            --jobs 4 \
            --colors=always \
            --output mutants.out

      - name: Upload mutants.out
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-out-${{ matrix.crate }}
          path: mutants.out
          retention-days: 30

      - name: Open issue on regression
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const crate = '${{ matrix.crate }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Nightly mutants: surviving mutants in \`${crate}\``;
            const body = [
              `The scheduled nightly mutation-testing run found surviving mutants in \`${crate}\`.`,
              ``,
              `- Run: ${runUrl}`,
              `- Date: ${new Date().toISOString().slice(0, 10)}`,
              ``,
              `Download the \`mutants-out-${crate}\` artifact from the run and inspect \`outcomes.json\` / \`missed.txt\` for the list.`,
              ``,
              `Action: add tests that kill the surviving mutants, or annotate them as out-of-scope in \`.cargo/mutants.toml\`.`,
            ].join('\n');

            // Dedupe: don't open a new issue if one already open with the same title.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'mutation-testing',
              per_page: 100,
            });
            if (existing.data.some(i => i.title === title)) {
              core.info(`Issue already open: ${title}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['mutation-testing', 'tech-debt'],
            });
