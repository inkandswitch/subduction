[package]
name = "subduction_wasm"
version = "0.5.1"
description = "Wasm/JavaScript bindings for Subduction (browser and Node.js)"
categories = ["web-programming"]
keywords = ["subduction", "websocket"]
readme = "./README.md"
exclude = ["e2e/server/pkg"]
publish = false

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
async-channel = { workspace = true }
async-lock = { workspace = true }
base58 = { workspace = true }
ciborium = { workspace = true, optional = true }
console_error_panic_hook = { workspace = true, optional = true }
ed25519-dalek = { workspace = true }
from_js_ref = { workspace = true }
future_form = { workspace = true }
futures = { workspace = true }
futures-timer = { workspace = true }
futures-util = { workspace = true }
getrandom = { workspace = true, features = ["js"] }
js-sys = { workspace = true }
keyhive_core = { workspace = true, optional = true }
nonempty = { workspace = true }
rand = { workspace = true }
sedimentree_core = { workspace = true }
sedimentree_wasm = { workspace = true }
subduction_core = { workspace = true }
subduction_crypto = { workspace = true }
subduction_ephemeral = { workspace = true, optional = true }
subduction_http_longpoll = { workspace = true, default-features = false }
subduction_keyhive = { workspace = true, features = ["serde"], optional = true }
subduction_keyhive_policy = { workspace = true, optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
wasm_refgen = { workspace = true }

[dependencies.web-sys]
version = "0.3.81"
default-features = false
features = [
  "BinaryType",
  "Crypto",
  "CryptoKey",
  "DomException",
  "DomStringList",
  "Headers",
  "IdbDatabase",
  "IdbFactory",
  "IdbObjectStore",
  "IdbOpenDbRequest",
  "IdbRequest",
  "IdbTransaction",
  "IdbTransactionMode",
  "IdbVersionChangeEvent",
  "MessageEvent",
  "Request",
  "RequestInit",
  "RequestMode",
  "Response",
  "ServiceWorkerGlobalScope",
  "SubtleCrypto",
  "Url",
  "WebSocket",
  "Window",
  "WorkerGlobalScope",
]

[target.'cfg(target_family = "wasm")'.dependencies]
getrandom_03 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }

[dev-dependencies]
wasm-bindgen-test = "0.2"

[features]
default = ["console_error_panic_hook", "ephemeral", "standalone"]
console_error_panic_hook = ["dep:console_error_panic_hook"]
ephemeral = ["dep:subduction_ephemeral"]
keyhive = ["dep:ciborium", "dep:keyhive_core", "dep:subduction_keyhive", "dep:subduction_keyhive_policy"]
# Enable the #[wasm_bindgen(start)] entry point. Disable when using
# subduction_wasm as a dependency of another cdylib crate that defines
# its own start function (wasm-bindgen allows only one per module).
standalone = []
# IndexedDB storage backend
idb = ["sedimentree_wasm/idb"]
std = [
  "async-channel/std",
  "async-lock/std",
  "futures/std",
  "futures-util/std",
  "js-sys/std",
  "rand/std",
  "sedimentree_core/std",
  "sedimentree_wasm/std",
  "subduction_core/std",
  "thiserror/std",
  "wasm-bindgen/std",
  "wasm-bindgen-futures/std"
]

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory", "--enable-multivalue", "--enable-mutable-globals", "--enable-nontrapping-float-to-int", "--enable-reference-types", "--enable-sign-ext", "--enable-simd"]

[lints]
workspace = true
