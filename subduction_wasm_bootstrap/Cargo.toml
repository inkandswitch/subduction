[package]
name = "subduction_wasm_bootstrap"
version = "0.1.0"
description = "Shared Wasm cdylib start-up: panic hook + basic tracing subscriber"
categories = ["web-programming"]
keywords = ["subduction", "wasm"]
publish = false

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

# Pure rlib — never built as a cdylib itself. Linked into each of the
# four cdylib crates (`subduction_wasm`, `sedimentree_wasm`,
# `automerge_sedimentree_wasm`, `automerge_subduction_wasm`), where its
# `init_basic()` is invoked from each cdylib's `#[wasm_bindgen(start)]`.

[dependencies]
console_error_panic_hook = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["registry", "std"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-tracing = { workspace = true }

[lints]
workspace = true
